<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"> This text is gonna change after clicking the button. </p>

    <button type="button" onclick="document.getElementById('demo').style.fontSize='40px'"> Click here!! </button>

    <p id="hiding"> THis helps to hide the text.</p>
    <button onclick="document.getElementById('hiding').style.display='none'"> Click me to hide</button>
</body>
</html>
